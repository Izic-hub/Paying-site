<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — Pay-Go</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" href="./Image/izic.jpg">
</head>
<body>
  <div class="auth-page">
    <div class="auth-logo">
      <img src="./Image/myphoto.png" alt="Pay-Go Logo">
      Izic✨ Pay-Go
    </div>

    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p class="auth-sub">Sign in to continue earning.</p>

      <form id="signup-form" action="main.html">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Your username" required>
        </div>
        <div class="form-group">
          <label for="create-password">Password</label>
          <input type="password" id="create-password" minlength="6" maxlength="8" placeholder="Your password" required>
        </div>
        <div class="form-group">
          <label for="coupon">Coupon Code</label>
          <input type="tel" id="coupon" maxlength="6" placeholder="6-digit code" required>
        </div>

        <button type="submit" class="btn-primary" style="margin-top:0.5rem;">Login →</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="singup.html">Sign up free</a></p>
    </div>
  </div>

  <footer class="footer">
    <h4>Pay-Go</h4>
    <p>&copy; Copyright <span id="year"></span> · Izic✨ Pay-Go</p>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
